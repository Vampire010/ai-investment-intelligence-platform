name: Autonomous Agent Reports

on:
  schedule:
    # 06:00, 10:00, 13:00, 18:00, 22:00 IST
    # GitHub cron uses UTC.
    - cron: "30 0,4,7,12,16 * * *"
  workflow_dispatch:
    inputs:
      max_stocks:
        description: "Maximum NSE stocks to scan"
        required: false
        default: "20"
      watchlist:
        description: "Optional comma-separated NSE symbols"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: autonomous-agent-reports
  cancel-in-progress: false

jobs:
  autonomous-report:
    name: Generate autonomous market intelligence report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run autonomous agents
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          MAX_STOCKS: ${{ github.event.inputs.max_stocks || '20' }}
          WATCHLIST: ${{ github.event.inputs.watchlist || '' }}
        run: |
          python -m market_agent.agents --run-once --max-stocks "$MAX_STOCKS" --watchlist "$WATCHLIST" --output-dir outputs/autonomous_agents --print-json
          PDF_PATH="$(ls -1 outputs/autonomous_agents/*.pdf | tail -n 1)"
          echo "PDF_PATH=$PDF_PATH" >> "$GITHUB_ENV"

      - name: Email PDF report
        if: ${{ env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' }}
        env:
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: girishrathode.rathode@gmail.com
          REPORT_PDF: ${{ env.PDF_PATH }}
        run: |
          python -m market_agent.agents.delivery --markdown "$(ls -1 outputs/autonomous_agents/*.md | tail -n 1)" --pdf "$REPORT_PDF" --email --subject "AI Investment Intelligence Platform Report"

      - name: Email setup notice
        if: ${{ env.SMTP_HOST == '' || env.SMTP_USERNAME == '' || env.SMTP_PASSWORD == '' }}
        run: |
          echo "SMTP secrets are not configured. PDF email delivery cannot run."
          echo "Required repository secrets: SMTP_HOST, SMTP_USERNAME, SMTP_PASSWORD."
          echo "Optional repository secrets: SMTP_PORT, EMAIL_FROM."
          exit 1
