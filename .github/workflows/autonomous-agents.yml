name: Autonomous Agent Reports

on:
  schedule:
    # 06:00, 10:00, 13:00, 18:00, 22:00 IST
    # GitHub cron uses UTC.
    - cron: "30 0,4,7,12,16 * * *"
  workflow_dispatch:
    inputs:
      max_stocks:
        description: "Maximum NSE stocks to scan"
        required: false
        default: "20"
      watchlist:
        description: "Optional comma-separated NSE symbols"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: autonomous-agent-reports
  cancel-in-progress: false

jobs:
  autonomous-report:
    name: Generate autonomous market intelligence report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run autonomous agents
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          MAX_STOCKS: ${{ github.event.inputs.max_stocks || '20' }}
          WATCHLIST: ${{ github.event.inputs.watchlist || '' }}
        run: |
          python -m market_agent.agents --run-once --max-stocks "$MAX_STOCKS" --watchlist "$WATCHLIST" --output-dir outputs/autonomous_agents --print-json

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-market-intelligence-${{ github.run_id }}
          path: outputs/autonomous_agents/
          if-no-files-found: error
          retention-days: 30
